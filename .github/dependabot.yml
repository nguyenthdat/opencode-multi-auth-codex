version: 2

updates:
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    reviewers:
      - nguyenthdat
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      opencode-runtime:
        patterns:
          - "@opencode-ai/*"
          - "@opentui/*"
          - solid-js
      development-tools:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    reviewers:
      - nguyenthdat
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
