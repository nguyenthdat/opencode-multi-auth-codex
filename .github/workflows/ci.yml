name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun ci

      - name: Typecheck
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Verify generated files are current
        run: |
          git diff --exit-code -- dist
          test -z "$(git status --porcelain --untracked-files=all -- dist)"

      - name: Audit production and development dependencies
        run: bun audit

      - name: Validate npm package contents
        run: |
          npm pack --dry-run --json > "$RUNNER_TEMP/npm-pack.json"
          bun -e '
            const [pack] = await Bun.file(`${process.env.RUNNER_TEMP}/npm-pack.json`).json()
            const files = new Set(pack.files.map((entry) => entry.path))
            const required = [
              "dist/cli.js",
              "dist/web.js",
              "dist/web-ui/dashboard.js",
              "dist/web-ui/dashboard.css"
            ]
            const missing = required.filter((file) => !files.has(file))
            if (missing.length) throw new Error(`Missing package files: ${missing.join(", ")}`)
          '

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
