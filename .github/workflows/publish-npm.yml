name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish npm and GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if [[ "$RELEASE_TAG" != "v$VERSION" ]]; then
            echo "Tag $RELEASE_TAG does not match package version $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun ci

      - name: Typecheck
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Verify generated files are current
        run: |
          git diff --exit-code -- dist
          test -z "$(git status --porcelain --untracked-files=all -- dist)"

      - name: Audit dependencies
        run: bun audit

      - name: Pack release artifact
        id: pack
        shell: bash
        run: |
          npm pack --json > npm-pack.json
          node -e '
            const [pack] = require("./npm-pack.json")
            const files = new Set(pack.files.map((entry) => entry.path))
            const required = [
              "dist/cli.js",
              "dist/web.js",
              "dist/web-ui/dashboard.js",
              "dist/web-ui/dashboard.css"
            ]
            const missing = required.filter((file) => !files.has(file))
            if (missing.length) throw new Error(`Missing package files: ${missing.join(", ")}`)
          '
          TARBALL=$(node -e "const [pack] = require('./npm-pack.json'); process.stdout.write(pack.filename)")
          sha256sum "$TARBALL" > "$TARBALL.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish to npm with provenance
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          VERSION: ${{ steps.release.outputs.version }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          if npm view "$PACKAGE_NAME@$VERSION" version --json > /dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION is already published; skipping npm publish."
          else
            npm publish "$TARBALL" --access public --provenance
          fi

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$TARBALL" "$TARBALL.sha256" --clobber
          else
            gh release create "$RELEASE_TAG" "$TARBALL" "$TARBALL.sha256" \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"
          fi
